version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: erp-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: erpadmin
      MONGO_INITDB_ROOT_PASSWORD: erppassword123
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - erp-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://erpadmin:erppassword123@mongodb:27017/cloud-erp?authSource=admin
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRE=7d
    depends_on:
      - mongodb
    ports:
      - "5000:5000"
    networks:
      - erp-network
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge

volumes:
  mongodb_data:
